<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid black; padding: 8px; text-align: center; }
        th { background-color: #f2f2f2; }
        .header { text-align: center; font-weight: bold; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="header">דו"ח נוכחות - {{ report_title }}</div>
    <table>
        <thead>
            <tr>
                <th>תאריך</th>
                <th>כניסה</th>
                <th>יציאה</th>
                <th>סה"כ שעות</th>
            </tr>
        </thead>
        <tbody>
            {% for row in rows %}
            <tr>
                <td>{{ row.date }}</td>
                <td>{{ row.entry_time }}</td>
                <td>{{ row.exit_time }}</td>
                <td>{{ "%.2f"|format(row.total_hours) }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
